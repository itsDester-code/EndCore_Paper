name: Build and Release PaperJar

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # чтобы можно было запускать вручную

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для создания релизов

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Paper Jar
      run: ./gradlew createReobfPaperclipJar

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: v${{ github.run_number }}  # автоматический тег, например v42
        release_name: PaperJar Release ${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload PaperJar to Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build/libs/*.jar
        asset_name: paperclip.jar
        asset_content_type: application/java-archive
